<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PR Dashboard</title>
<link id="favicon" rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FF8C00'/%3E%3C/svg%3E" />
<meta name="description" content="A private, open-source dashboard for your open + recently-closed GitHub PRs with live CI status. Runs entirely in your browser." />
<meta property="og:title" content="PR Dashboard" />
<meta property="og:description" content="Your open + recently-closed PRs with live CI status — private, client-side, open source." />
<meta name="twitter:card" content="summary" />
<style>
  :root {
    /* accent (overwritten by theme; orange default) */
    --accent:#FF8C00; --accent-ink:#C05600; --on-accent:#241400;
    --accent-soft:rgba(255,140,0,.12); --accent-line:rgba(255,140,0,.45);
    /* light canvas */
    --bg:#ffffff; --surface:#ffffff; --surface2:#fafafb; --inset:#f4f4f7;
    --line:#e8e8ee; --line2:#f0f0f4;
    --text:#15151c; --muted:#71717f; --faint:#9a9aa6;
    /* semantic (theme-independent) */
    --open:#15803d; --merged:#7c3aed; --closed:#c2410c; --review:#b45309;
    --pass:#15803d; --fail:#dc2626; --run:#b45309;
    --shadow:0 1px 2px rgba(20,20,45,.04), 0 10px 30px rgba(20,20,45,.07);
    --shadow-sm:0 1px 2px rgba(20,20,45,.05);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  * { box-sizing:border-box; }
  html,body { background:var(--bg); }
  body {
    margin:0; color:var(--text); font:14.5px/1.55 var(--sans);
    background:
      radial-gradient(820px 360px at 8% -10%, var(--accent-soft), transparent 60%),
      radial-gradient(680px 320px at 102% -6%, var(--accent-soft), transparent 55%),
      var(--bg);
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  a { color:var(--accent-ink); }
  .mono { font-family:var(--mono); }
  .eyebrow { font-family:var(--mono); font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent-ink); font-weight:600; }
  /* transitions so theme switches feel alive */
  .swatch,.btn,.chip,.logo,.brand-box,.badge,details.repo,.connect,.card { transition:background-color .25s, border-color .25s, color .25s, box-shadow .25s; }

  header { position:sticky; top:0; z-index:20; background:rgba(255,255,255,.82); backdrop-filter:saturate(1.4) blur(12px); border-bottom:1px solid var(--line); padding:13px 22px; }
  .brand { display:flex; align-items:center; gap:12px; }
  .brand-box { width:38px; height:38px; border-radius:11px; background:var(--accent); box-shadow:inset 0 1px 0 rgba(255,255,255,.45), var(--shadow-sm); flex:0 0 auto; }
  .avatar { width:38px; height:38px; border-radius:50%; object-fit:cover; border:2px solid var(--accent-line); box-shadow:0 0 0 3px var(--accent-soft); background:var(--inset); flex:0 0 auto; }
  .who { display:flex; flex-direction:column; line-height:1.25; min-width:0; }
  .who .name { font-family:var(--mono); font-weight:600; font-size:15px; letter-spacing:-.01em; }
  .who .name b { color:var(--accent-ink); }
  .who .sub { color:var(--muted); font-size:12px; }
  .grow { flex:1; }
  .hbtns { display:flex; align-items:center; gap:9px; }
  .btn { cursor:pointer; padding:8px 14px; border-radius:10px; border:1px solid var(--line); background:var(--surface); color:var(--text); font:600 13px var(--sans); box-shadow:var(--shadow-sm); text-decoration:none; display:inline-flex; align-items:center; gap:7px; }
  .btn:hover { border-color:var(--accent-line); }
  .btn.primary { background:var(--accent); color:var(--on-accent); border-color:transparent; }
  .btn.primary:hover { filter:brightness(1.04); }
  .btn.ghost { background:transparent; box-shadow:none; color:var(--muted); }
  .btn.ghost:hover { color:var(--text); }
  .btn[disabled] { opacity:.55; cursor:default; }
  .toggle { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:12px; cursor:pointer; user-select:none; font-family:var(--mono); }
  .toggle input { accent-color:var(--accent); }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:6px; }

  .controls { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; align-items:center; }
  #q { flex:1; min-width:240px; padding:9px 13px; border-radius:10px; border:1px solid var(--line); background:var(--surface); color:var(--text); font-size:14px; box-shadow:var(--shadow-sm); }
  #q:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { cursor:pointer; user-select:none; padding:6px 12px; border-radius:999px; border:1px solid var(--line); background:var(--surface); color:var(--muted); font:600 12px var(--mono); }
  .chip:hover { color:var(--text); }
  .chip.active { color:var(--accent-ink); border-color:var(--accent-line); background:var(--accent-soft); }
  .counts { color:var(--muted); font-size:12px; margin-left:auto; white-space:nowrap; font-family:var(--mono); }
  .counts b { color:var(--text); }

  main { padding:18px 22px 70px; max-width:1080px; margin:0 auto; }

  /* swatches */
  .swatches { display:flex; gap:11px; align-items:center; flex-wrap:wrap; }
  .swatch { width:30px; height:30px; border-radius:50%; background:var(--sw); border:none; cursor:pointer; position:relative; padding:0; box-shadow:var(--shadow-sm); }
  .swatch:hover { transform:translateY(-2px); }
  .swatch.on { box-shadow:0 0 0 2px var(--bg), 0 0 0 4px var(--sw); }
  .swatch.on::after { content:"✓"; position:absolute; inset:0; display:grid; place-items:center; color:#fff; font-size:14px; font-weight:800; text-shadow:0 1px 2px rgba(0,0,0,.3); }

  /* dashboard */
  details.repo { margin-bottom:13px; border:1px solid var(--line); border-radius:14px; overflow:hidden; background:var(--surface); box-shadow:var(--shadow-sm); }
  details.repo > summary { cursor:pointer; padding:11px 15px; font-weight:700; list-style:none; display:flex; align-items:center; gap:10px; }
  details.repo > summary::-webkit-details-marker { display:none; }
  details.repo > summary::before { content:"▸"; color:var(--accent-ink); transition:transform .15s; display:inline-block; }
  details.repo[open] > summary::before { transform:rotate(90deg); }
  details.repo > summary .rname { font-family:var(--mono); font-size:13.5px; letter-spacing:-.01em; }
  .repo-count { color:var(--faint); font-weight:500; font-size:12px; font-family:var(--mono); }
  .repo-badges { margin-left:auto; display:flex; gap:6px; font-size:12px; }
  .pr { border-top:1px solid var(--line2); }
  details.pr > summary { cursor:pointer; padding:10px 15px; list-style:none; display:flex; align-items:center; gap:10px; }
  details.pr > summary::-webkit-details-marker { display:none; }
  details.pr[open] > summary { background:var(--surface2); }
  .ci-dot { width:18px; text-align:center; flex:0 0 auto; font-size:13px; }
  .pr-title { color:var(--text); text-decoration:none; font-weight:600; }
  .pr-title:hover { color:var(--accent-ink); text-decoration:underline; }
  .pr-num { color:var(--faint); font-size:12px; font-family:var(--mono); }
  .badge { font:600 11px var(--mono); padding:1px 8px; border-radius:999px; border:1px solid; white-space:nowrap; }
  .b-open { color:var(--open); border-color:color-mix(in srgb,var(--open) 40%,transparent); background:color-mix(in srgb,var(--open) 8%,transparent); }
  .b-merged { color:var(--merged); border-color:color-mix(in srgb,var(--merged) 40%,transparent); background:color-mix(in srgb,var(--merged) 8%,transparent); }
  .b-closed { color:var(--closed); border-color:color-mix(in srgb,var(--closed) 40%,transparent); background:color-mix(in srgb,var(--closed) 8%,transparent); }
  .b-draft { color:var(--muted); border-color:var(--line); }
  .b-review { color:var(--review); border-color:color-mix(in srgb,var(--review) 40%,transparent); background:color-mix(in srgb,var(--review) 8%,transparent); }
  .spacer { flex:1; }
  .when { color:var(--faint); font-size:12px; white-space:nowrap; font-family:var(--mono); }
  .stat { color:var(--faint); font-size:12px; font-family:var(--mono); }
  .checks { padding:5px 15px 13px 42px; background:var(--surface2); }
  .check { display:flex; align-items:center; gap:8px; padding:3px 0; font:13px var(--mono); }
  .check a { text-decoration:none; color:var(--accent-ink); }
  .check a:hover { text-decoration:underline; }
  .check .wf { color:var(--faint); }
  .none { color:var(--muted); font-style:italic; }
  .empty { color:var(--muted); text-align:center; padding:46px; }

  /* landing */
  .hero { max-width:680px; margin:54px auto 0; text-align:center; }
  .hero .eyebrow { display:block; margin-bottom:16px; }
  .hero h1 { font-size:clamp(34px,6vw,52px); line-height:1.02; letter-spacing:-.03em; margin:0 0 14px; font-weight:800; }
  .hero h1 .accentword { color:var(--accent-ink); }
  .hero p.tag { color:var(--muted); font-size:16px; margin:0 auto; max-width:540px; }
  .pickrow { max-width:680px; margin:26px auto 0; display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; }
  .pickrow .lbl { font-family:var(--mono); font-size:12px; color:var(--faint); letter-spacing:.04em; }

  .connect { max-width:660px; margin:30px auto 0; background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:24px; box-shadow:var(--shadow); }
  .connect .lbl { font-family:var(--mono); font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:0 0 8px; display:block; }
  .connect .row { display:flex; gap:10px; flex-wrap:wrap; }
  .connect input { flex:1; min-width:230px; padding:12px 14px; border-radius:11px; border:1px solid var(--line); background:var(--surface2); color:var(--text); font:14px var(--mono); }
  .connect input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); background:var(--surface); }
  .connect .btn.primary, .connect .btn { padding:12px 18px; font-size:14px; }
  .help { margin-top:11px; color:var(--muted); font-size:12.5px; }
  .help b { color:var(--text); }
  .help code { font-family:var(--mono); background:var(--inset); border:1px solid var(--line); padding:1px 6px; border-radius:6px; font-size:11.5px; }
  .err { color:var(--fail); font-size:13px; margin-top:11px; min-height:18px; }

  .info { max-width:880px; margin:34px auto 0; display:grid; grid-template-columns:1fr 1fr; gap:34px; }
  @media (max-width:720px){ .info { grid-template-columns:1fr; gap:26px; } }
  .info h3 { font-size:13px; margin:0 0 14px; display:flex; align-items:center; gap:9px; font-family:var(--mono); letter-spacing:.04em; color:var(--text); }
  .info ul { margin:0; padding:0; list-style:none; }
  .info .safe li { color:var(--muted); font-size:13px; margin:0 0 12px; padding-left:18px; position:relative; }
  .info .safe li::before { content:""; position:absolute; left:0; top:8px; width:7px; height:7px; border-radius:50%; background:var(--accent); }
  ol.steps { margin:0; padding:0; counter-reset:s; list-style:none; }
  ol.steps li { position:relative; padding:0 0 14px 36px; color:var(--muted); font-size:13px; }
  ol.steps li::before { counter-increment:s; content:counter(s); position:absolute; left:0; top:-2px; width:24px; height:24px; border-radius:50%; background:var(--accent-soft); border:1px solid var(--accent-line); color:var(--accent-ink); font:700 12px var(--mono); display:grid; place-items:center; }
  ol.steps b, .info .safe b { color:var(--text); }
  ol.steps code, .info code { font-family:var(--mono); background:var(--inset); border:1px solid var(--line); padding:1px 6px; border-radius:6px; font-size:11.5px; color:var(--text); }
  .foot { max-width:880px; margin:40px auto 0; text-align:center; color:var(--faint); font-size:12px; font-family:var(--mono); }
  .dstatus { margin-top:8px; font-size:13px; }

  .spin { display:inline-block; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .rise { animation:rise .5s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .hide { display:none !important; }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-box" id="brandBox"></div>
    <img class="avatar hide" id="brandAvatar" alt="" />
    <div class="who">
      <span class="name" id="brandName">pr&middot;dashboard</span>
      <span class="sub" id="brandSub">open + recently-closed PRs · live CI</span>
    </div>
    <span class="grow"></span>
    <div class="hbtns" id="brandBtns">
      <a class="btn ghost" id="srcLink" href="#" target="_blank" rel="noopener">View source ↗</a>
      <button class="btn primary hide" id="refresh">🔄 Refresh</button>
      <label class="toggle hide" id="autoWrap"><input type="checkbox" id="auto" /> auto 60s</label>
      <button class="btn hide" id="settings" title="Settings & sign out">⚙︎</button>
    </div>
  </div>
  <div class="controls hide" id="controls">
    <input id="q" type="search" placeholder="Search title, repo, branch, #number…   (press / to focus)" />
    <div class="chips" id="chips">
      <span class="chip active" data-f="all">all</span>
      <span class="chip" data-f="open">open</span>
      <span class="chip" data-f="closed">closed/merged</span>
      <span class="chip" data-f="failing">ci failing</span>
      <span class="chip" data-f="running">ci running</span>
    </div>
    <span class="counts" id="counts"></span>
  </div>
</header>
<main id="main"></main>

<script>
const REPO_URL = "https://github.com/alberthammerich/pr-dashboard"; // open-source home
const SRC = REPO_URL.replace("https://github.com/","");
const LS = { token:"prdash_token", author:"prdash_author", hours:"prdash_hours", me:"prdash_me", theme:"prdash_theme" };
const HOURS_DEFAULT = 48;

/* ---------- themes (tuned for a white canvas) ---------- */
const THEMES = {
  orange: { name:"Orange",        accent:"#FF8C00", ink:"#C05600", on:"#241400", soft:"rgba(255,140,0,.12)",  line:"rgba(255,140,0,.45)" },
  blue:   { name:"Classic Blue",  accent:"#0F4C81", ink:"#0F4C81", on:"#ffffff", soft:"rgba(15,76,129,.10)",  line:"rgba(15,76,129,.38)" },
  green:  { name:"Emerald",       accent:"#009473", ink:"#00795E", on:"#ffffff", soft:"rgba(0,148,115,.12)",  line:"rgba(0,148,115,.40)" },
  yellow: { name:"Gold",          accent:"#F5B800", ink:"#9A6B00", on:"#221900", soft:"rgba(245,184,0,.14)",  line:"rgba(245,184,0,.50)" },
  purple: { name:"Lavender",      accent:"#C5B8FF", ink:"#6B57D6", on:"#1E163A", soft:"rgba(197,184,255,.20)",line:"rgba(197,184,255,.60)" },
  coral:  { name:"Living Coral",  accent:"#FF6F61", ink:"#E04A3F", on:"#2A0A06", soft:"rgba(255,111,97,.14)", line:"rgba(255,111,97,.50)" },
};
const get = (k, d) => localStorage.getItem(k) ?? d;
const $ = id => document.getElementById(id);
function applyTheme(key){
  const t = THEMES[key] || THEMES.orange;
  const s = document.documentElement.style;
  s.setProperty("--accent", t.accent); s.setProperty("--accent-ink", t.ink); s.setProperty("--on-accent", t.on);
  s.setProperty("--accent-soft", t.soft); s.setProperty("--accent-line", t.line);
  localStorage.setItem(LS.theme, (THEMES[key]?key:"orange"));
  if(!(ME)) $("favicon").href = "data:image/svg+xml,"+encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='"+t.accent+"'/></svg>");
  document.querySelectorAll(".swatch").forEach(el=>el.classList.toggle("on", el.dataset.t===(THEMES[key]?key:"orange")));
}
function swatchRow(){
  const cur = get(LS.theme,"orange");
  return Object.entries(THEMES).map(([k,t])=>
    '<button class="swatch'+(k===cur?' on':'')+'" data-t="'+k+'" title="'+t.name+'" aria-label="Theme: '+t.name+'" style="--sw:'+t.accent+'"></button>'
  ).join("");
}

let DB = null, ME = null, activeFilter = "all", autoTimer = null;
const ICON = { pass:"✅", fail:"❌", running:"🟡", skip:"⚪", none:"·", other:"⚪" };
const CIICON = { pass:"✅", fail:"❌", running:"🟡", none:"·" };
function rel(iso){ if(!iso) return ""; const d=(Date.now()-new Date(iso).getTime())/1000,m=60,h=3600,day=86400;
  if(d<0) return "just now"; if(d<m) return Math.floor(d)+"s ago"; if(d<h) return Math.floor(d/m)+"m ago"; if(d<day) return Math.floor(d/h)+"h ago"; return Math.floor(d/day)+"d ago"; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- GitHub REST ---------- */
function api(path){
  const token = get(LS.token, "");
  return fetch("https://api.github.com"+path, {
    headers:{ "Authorization":"Bearer "+token, "Accept":"application/vnd.github+json", "X-GitHub-Api-Version":"2022-11-28" }, cache:"no-store",
  }).then(async r=>{
    if(r.status===401) throw new Error("Bad token (401) — open ⚙︎ and re-enter it.");
    if(r.status===403){ const b=await r.text(); throw new Error("Rate limited / forbidden (403). "+(b.includes("rate")?"Wait a minute.":"")); }
    if(!r.ok) throw new Error("GitHub "+r.status+" on "+path);
    return r.json();
  });
}
async function pool(items, n, fn){
  const out=new Array(items.length); let i=0;
  await Promise.all(Array.from({length:Math.min(n,items.length)||1}, async()=>{
    while(i<items.length){ const idx=i++; try{ out[idx]=await fn(items[idx],idx); }catch(e){ out[idx]={__err:String(e.message||e)}; } }
  }));
  return out;
}
function normChecks(runs, statuses){
  const out=[];
  for(const c of (runs||[])){
    let status;
    if((c.status||"").toUpperCase()!=="COMPLETED") status="running";
    else { const k=(c.conclusion||"").toUpperCase(); status = k==="SUCCESS"?"pass" : (k==="NEUTRAL"||k==="SKIPPED")?"skip" : "fail"; }
    out.push({ status, name:c.name||"check", workflow:(c.app&&c.app.name)||"", url:c.details_url||c.html_url||"" });
  }
  for(const s of (statuses||[])){
    const k=(s.state||"").toUpperCase();
    const status = k==="SUCCESS"?"pass" : k==="PENDING"?"running" : (k==="FAILURE"||k==="ERROR")?"fail":"other";
    out.push({ status, name:s.context||"status", workflow:"", url:s.target_url||"" });
  }
  return out;
}
function rollup(checks){ if(!checks.length) return "none";
  if(checks.some(c=>c.status==="fail")) return "fail";
  if(checks.some(c=>c.status==="running")) return "running";
  if(checks.some(c=>c.status==="pass")) return "pass"; return "none"; }
async function enrich(item){
  const repo = item.repository_url.replace("https://api.github.com/repos/","");
  const merged = !!(item.pull_request && item.pull_request.merged_at);
  let state = item.state==="open" ? "OPEN" : (merged ? "MERGED" : "CLOSED");
  let branch="", sha="", additions=null, deletions=null, comments=null, draft=!!item.draft, review="";
  try {
    const pr = await api("/repos/"+repo+"/pulls/"+item.number);
    sha=pr.head&&pr.head.sha; branch=(pr.head&&pr.head.ref)||""; draft=!!pr.draft;
    additions=pr.additions; deletions=pr.deletions; comments=pr.comments;
    if((pr.requested_reviewers&&pr.requested_reviewers.length)||(pr.requested_teams&&pr.requested_teams.length)) review="REVIEW_REQUIRED";
  } catch(e){}
  let checks=[];
  if(sha){
    const [cr, st] = await Promise.all([
      api("/repos/"+repo+"/commits/"+sha+"/check-runs?per_page=100").then(r=>r.check_runs).catch(()=>[]),
      api("/repos/"+repo+"/commits/"+sha+"/status").then(r=>r.statuses).catch(()=>[]),
    ]);
    checks = normChecks(cr, st);
  }
  return { number:item.number, title:item.title, url:item.html_url, repo, state, isDraft:draft,
    reviewDecision:review, branch, additions, deletions, comments,
    createdAt:item.created_at, updatedAt:item.updated_at, closedAt:item.closed_at||null, ci:rollup(checks), checks };
}
async function collect(){
  const author = get(LS.author, "") || (ME && ME.login);
  const hours = Number(get(LS.hours, HOURS_DEFAULT));
  const cutoff = Date.now() - hours*3600*1000;
  const sinceDay = new Date(cutoff).toISOString().slice(0,10);
  const q = s => "/search/issues?per_page=60&sort=updated&order=desc&q=" + encodeURIComponent(s);
  const [open, closed] = await Promise.all([
    api(q(`author:${author} type:pr state:open`)).then(r=>r.items),
    api(q(`author:${author} type:pr state:closed closed:>=${sinceDay}`)).then(r=>r.items),
  ]);
  const recentClosed = closed.filter(p=>p.closed_at && new Date(p.closed_at).getTime()>=cutoff);
  const prs = await pool([...open, ...recentClosed], 6, enrich);
  return { prs, generatedAt:new Date().toISOString(), author, hours };
}

/* ---------- render dashboard ---------- */
function stateBadge(pr){ if(pr.state==="MERGED")return '<span class="badge b-merged">merged</span>';
  if(pr.state==="CLOSED")return '<span class="badge b-closed">closed</span>';
  if(pr.isDraft)return '<span class="badge b-draft">draft</span>'; return '<span class="badge b-open">open</span>'; }
function reviewBadge(pr){ return (pr.state==="OPEN"&&pr.reviewDecision==="REVIEW_REQUIRED")?'<span class="badge b-review">review</span>':""; }
function matches(pr, term){
  if(activeFilter==="open"&&pr.state!=="OPEN") return false;
  if(activeFilter==="closed"&&pr.state==="OPEN") return false;
  if(activeFilter==="failing"&&pr.ci!=="fail") return false;
  if(activeFilter==="running"&&pr.ci!=="running") return false;
  if(!term) return true;
  const hay=(pr.title+" "+pr.repo+" "+pr.branch+" #"+pr.number).toLowerCase();
  return term.split(/\s+/).every(t=>hay.includes(t));
}
function render(){
  if(!DB) return;
  const term=$("q").value.trim().toLowerCase();
  const main=$("main"); const byRepo={}; let shown=0;
  for(const pr of DB.prs){ if(!matches(pr,term)) continue; (byRepo[pr.repo]||=[]).push(pr); shown++; }
  const repos=Object.keys(byRepo).sort(); main.innerHTML="";
  if(!repos.length){ main.innerHTML='<div class="empty">No PRs match.</div>'; updateCounts(0); return; }
  const expandFail=!!term||activeFilter!=="all";
  for(const repo of repos){
    const list=byRepo[repo].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
    const fail=list.filter(p=>p.ci==="fail").length, run=list.filter(p=>p.ci==="running").length;
    const d=document.createElement("details"); d.className="repo"; d.open=true;
    let badges=""; if(fail)badges+='<span class="badge b-closed">'+fail+' ❌</span>'; if(run)badges+='<span class="badge b-review">'+run+' 🟡</span>';
    d.innerHTML='<summary><span class="rname">'+esc(repo)+'</span> <span class="repo-count">'+list.length+'</span><span class="repo-badges">'+badges+'</span></summary>';
    for(const pr of list){
      const pd=document.createElement("details"); pd.className="pr"; pd.open=expandFail&&(pr.ci==="fail"||activeFilter==="failing");
      let checksHtml;
      if(!pr.checks.length){ checksHtml='<div class="none">No CI checks.</div>'; }
      else { const order={fail:0,running:1,pass:2,skip:3,other:4};
        checksHtml=pr.checks.slice().sort((a,b)=>(order[a.status]??9)-(order[b.status]??9)).map(c=>
          '<div class="check">'+(ICON[c.status]||"·")+' '
          +(c.url?'<a href="'+esc(c.url)+'" target="_blank" rel="noopener">'+esc(c.name)+'</a>':esc(c.name))
          +(c.workflow?' <span class="wf">· '+esc(c.workflow)+'</span>':'')+'</div>').join(""); }
      const stats=(pr.additions!=null)?'<span class="stat">+'+pr.additions+' −'+pr.deletions+'</span>':'';
      pd.innerHTML='<summary><span class="ci-dot" title="CI: '+pr.ci+'">'+(CIICON[pr.ci]||"·")+'</span>'
        +'<a class="pr-title" href="'+esc(pr.url)+'" target="_blank" rel="noopener">'+esc(pr.title)+'</a>'
        +'<span class="pr-num">#'+pr.number+(pr.branch?' · '+esc(pr.branch):'')+'</span>'
        +stateBadge(pr)+reviewBadge(pr)+'<span class="spacer"></span>'+stats
        +'<span class="when">'+rel(pr.state==="OPEN"?pr.updatedAt:pr.closedAt)+'</span></summary>'
        +'<div class="checks">'+checksHtml+'</div>';
      d.appendChild(pd);
    }
    main.appendChild(d);
  }
  updateCounts(shown);
}
function updateCounts(shown){
  if(!DB){ $("counts").textContent=""; return; }
  const t=DB.prs.length, fail=DB.prs.filter(p=>p.ci==="fail").length, run=DB.prs.filter(p=>p.ci==="running").length;
  $("counts").innerHTML="<b>"+shown+"</b> / "+t+" prs"+(fail?" · <b>"+fail+"</b> failing":"")+(run?" · <b>"+run+"</b> running":"");
  $("brandSub").textContent="open + closed < "+DB.hours+"h · updated "+rel(DB.generatedAt);
}

/* ---------- landing ---------- */
function showLanding(errMsg){
  $("brandBox").classList.remove("hide"); $("brandAvatar").classList.add("hide");
  $("brandName").innerHTML="pr&middot;dashboard"; $("brandSub").textContent="open + recently-closed PRs · live CI";
  $("refresh").classList.add("hide"); $("autoWrap").classList.add("hide"); $("settings").classList.add("hide");
  $("controls").classList.add("hide"); $("srcLink").classList.remove("hide");
  $("main").innerHTML =
    '<div class="hero rise"><span class="eyebrow">Open source · runs in your browser</span>'
    +'<h1>Your <span class="accentword">pull&nbsp;requests</span>,<br>finally in one place.</h1>'
    +'<p class="tag">Every PR you’ve got open, plus everything you closed in the last couple of days — grouped by repo, with live CI you can expand. Private to you.</p></div>'
    +'<div class="pickrow rise"><span class="lbl">// pick your color</span><div class="swatches" id="swatches">'+swatchRow()+'</div></div>'
    +'<div class="connect rise"><span class="lbl">Your GitHub token</span><div class="row">'
      +'<input id="tok" type="password" placeholder="ghp_…" autocomplete="off" />'
      +'<button class="btn primary" id="connect">Connect here →</button>'
      +'<button class="btn" id="deploy">🚀 Deploy to my GitHub</button>'
    +'</div>'
    +'<div class="help"><b>Connect here</b> uses it on this page now. <b>Deploy</b> creates your own copy at <code>your-name.github.io/pr-dashboard/</code> — needs the <code>repo</code> scope.</div>'
    +'<div class="err" id="lerr">'+(errMsg?esc(errMsg):"")+'</div><div class="dstatus" id="dstatus"></div></div>'
    +'<div class="info rise">'
      +'<div class="safe"><h3>🛡️ Why this is safe</h3><ul>'
        +'<li>It’s a <b>static page</b> — no backend. Nothing you type goes anywhere except straight to <code>api.github.com</code>.</li>'
        +'<li>Your token lives <b>only in this browser’s</b> <code>localStorage</code>, on this device.</li>'
        +'<li><b>100% open source</b> — <a id="srcLink2" href="#" target="_blank" rel="noopener">read every line</a>. No hidden calls, no analytics.</li>'
        +'<li>Used <b>read-only</b>; it never writes to your repos. <b>Sign out</b> wipes it anytime.</li>'
      +'</ul></div>'
      +'<div><h3>⚙︎ Set up in a minute</h3><ol class="steps">'
        +'<li><b>Create a token:</b> <a href="https://github.com/settings/tokens/new?scopes=repo&description=PR%20Dashboard" target="_blank" rel="noopener">github.com/settings/tokens/new</a> → tick <code>repo</code> → <b>No expiration</b> → Generate.</li>'
        +'<li><b>Org with SSO?</b> click <b>Configure SSO</b> on the token and authorize it.</li>'
        +'<li><b>Paste it</b> and Connect — you won’t paste it again on this browser.</li>'
      +'</ol></div>'
    +'</div>'
    +'<div class="foot">no accounts · no tracking · open source — <a id="srcLink3" href="#" target="_blank" rel="noopener">view the code</a></div>';
  ["srcLink","srcLink2","srcLink3"].forEach(id=>{ const el=$(id); if(el) el.href=REPO_URL; });
  const go=()=>{ const tv=$("tok").value.trim(); if(!tv){ $("lerr").textContent="Paste a token first."; return; } localStorage.setItem(LS.token, tv); connectAndLoad(); };
  $("connect").onclick=go; $("deploy").onclick=deployFlow;
  $("tok").addEventListener("keydown", e=>{ if(e.key==="Enter") go(); });
  $("tok").focus();
}

/* ---------- settings ---------- */
function showSettings(){
  const author=get(LS.author,"")||(ME&&ME.login)||"", hours=get(LS.hours,HOURS_DEFAULT);
  $("main").innerHTML =
    '<div class="connect" style="max-width:560px"><span class="lbl">Color theme</span>'
    +'<div class="swatches" id="swatches" style="margin:2px 0 18px">'+swatchRow()+'</div>'
    +'<span class="lbl">Author to track (defaults to you)</span><input id="sAuth" value="'+esc(author)+'" />'
    +'<span class="lbl" style="margin-top:14px">Closed window (hours)</span><input id="sHrs" type="number" value="'+esc(String(hours))+'" />'
    +'<div class="row" style="margin-top:18px"><button class="btn primary" id="sSave">Save & reload</button>'
    +'<button class="btn" id="sOut">Sign out</button></div></div>';
  $("sSave").onclick=()=>{ localStorage.setItem(LS.author, $("sAuth").value.trim()); localStorage.setItem(LS.hours, String(Number($("sHrs").value)||HOURS_DEFAULT)); DB=null; load(); };
  $("sOut").onclick=signOut;
}
function signOut(){
  localStorage.removeItem(LS.token); localStorage.removeItem(LS.author); localStorage.removeItem(LS.hours); localStorage.removeItem(LS.me);
  DB=null; ME=null; if(autoTimer){ clearInterval(autoTimer); autoTimer=null; } $("auto").checked=false;
  applyTheme(get(LS.theme,"orange")); showLanding();
}

/* ---------- identity + load ---------- */
function applyIdentity(me){
  ME=me;
  $("brandBox").classList.add("hide");
  const av=$("brandAvatar"); av.src=me.avatar_url; av.classList.remove("hide");
  $("brandName").innerHTML="<b>"+esc(me.login)+"</b>";
  $("favicon").href=me.avatar_url;
  $("refresh").classList.remove("hide"); $("autoWrap").classList.remove("hide"); $("settings").classList.remove("hide");
  $("srcLink").classList.add("hide"); $("controls").classList.remove("hide");
}
async function connectAndLoad(){
  $("main").innerHTML='<div class="empty"><span class="spin">⟳</span> Connecting…</div>';
  try{
    const me=await api("/user");
    localStorage.setItem(LS.me, JSON.stringify({login:me.login, avatar_url:me.avatar_url, name:me.name}));
    applyIdentity(me); await load();
  }catch(e){ localStorage.removeItem(LS.token); showLanding(String(e.message||e)); }
}
async function load(){
  if(!get(LS.token,"")){ showLanding(); return; }
  if(!ME){ const cached=get(LS.me,""); if(cached){ try{ applyIdentity(JSON.parse(cached)); }catch(e){} } }
  const btn=$("refresh"); btn.disabled=true; btn.innerHTML='<span class="spin">⟳</span> Refreshing…';
  if(!DB){ $("main").innerHTML='<div class="empty"><span class="spin">⟳</span> Loading your PRs…</div>'; }
  try{ DB=await collect(); render(); }
  catch(e){
    $("main").innerHTML='<div class="connect" style="max-width:560px"><h3 style="margin:0 0 8px">Couldn’t load</h3><p class="err">'+esc(String(e.message||e))+'</p><div class="row"><button class="btn primary" id="retry">Retry</button><button class="btn" id="fix">Settings</button></div></div>';
    const r=$("retry"), f=$("fix"); if(r) r.onclick=load; if(f) f.onclick=showSettings;
  }
  finally{ btn.disabled=false; btn.innerHTML="🔄 Refresh"; }
}

/* ---------- deploy a copy to the user's own GitHub ---------- */
function b64utf8(s){ return btoa(unescape(encodeURIComponent(s))); }
function debase64(s){ return decodeURIComponent(escape(atob((s||"").replace(/\s/g,"")))); }
async function fetchSource(path){ const r=await api("/repos/"+SRC+"/contents/"+path); return debase64(r.content); }
function ghRaw(path, opts){
  opts=opts||{}; const token=get(LS.token,"");
  return fetch("https://api.github.com"+path, {
    method:opts.method||"GET",
    headers:Object.assign({ "Authorization":"Bearer "+token, "Accept":"application/vnd.github+json", "X-GitHub-Api-Version":"2022-11-28" }, opts.body?{"Content-Type":"application/json"}:{}),
    body:opts.body?JSON.stringify(opts.body):undefined, cache:"no-store",
  }).then(async r=>{ let j=null; try{ j=await r.json(); }catch(e){} return {status:r.status, json:j}; });
}
async function putFile(owner,repo,path,content,branch){
  const g=await ghRaw("/repos/"+owner+"/"+repo+"/contents/"+path+"?ref="+branch);
  const body={ message:"Add "+path, content:b64utf8(content), branch };
  if(g.status===200 && g.json && g.json.sha) body.sha=g.json.sha;
  const r=await ghRaw("/repos/"+owner+"/"+repo+"/contents/"+path, {method:"PUT", body});
  if(r.status>=400) throw new Error("Upload of "+path+" failed ("+r.status+").");
}
async function waitBuild(owner,repo){
  for(let i=0;i<24;i++){ const b=await ghRaw("/repos/"+owner+"/"+repo+"/pages/builds/latest");
    if(b.json && b.json.status==="built") return true; await new Promise(r=>setTimeout(r,5000)); }
  return false;
}
async function deployFlow(){
  const tv=$("tok").value.trim();
  if(!tv){ $("lerr").textContent="Paste a token first — deploying needs the 'repo' scope."; return; }
  localStorage.setItem(LS.token, tv);
  const dbtn=$("deploy"), cbtn=$("connect"); dbtn.disabled=true; cbtn.disabled=true; $("lerr").textContent="";
  const set=m=>{ $("dstatus").innerHTML='<span class="spin">⟳</span> '+esc(m); };
  try{
    set("Reading your account…");
    const me=await api("/user"); const owner=me.login, repo="pr-dashboard";
    set("Fetching the latest source…");
    const [idx,rd,lic]=await Promise.all([ fetchSource("index.html"), fetchSource("README.md").catch(()=>""), fetchSource("LICENSE").catch(()=>"") ]);
    set("Creating "+owner+"/"+repo+" on your account…");
    const cr=await ghRaw("/user/repos", {method:"POST", body:{ name:repo, description:"My PR dashboard — open + recently-closed PRs with live CI", homepage:"https://"+owner+".github.io/"+repo+"/", auto_init:true, has_issues:false, has_wiki:false, has_projects:false }});
    if(cr.status>=400 && cr.status!==422) throw new Error("Couldn’t create the repo ("+cr.status+"). Make sure your token has the 'repo' scope ticked.");
    if(cr.status===422) set("You already have that repo — updating it…");
    const info=await api("/repos/"+owner+"/"+repo); const branch=info.default_branch||"main";
    set("Uploading the dashboard…");
    await putFile(owner,repo,"index.html",idx,branch);
    if(rd) await putFile(owner,repo,"README.md",rd,branch);
    if(lic) await putFile(owner,repo,"LICENSE",lic,branch);
    set("Enabling GitHub Pages…");
    await ghRaw("/repos/"+owner+"/"+repo+"/pages", {method:"POST", body:{ source:{ branch, path:"/" } }});
    const url="https://"+owner+".github.io/"+repo+"/";
    set("Waiting for the first Pages build (~1 min)…");
    const built=await waitBuild(owner,repo);
    $("dstatus").innerHTML =
      '<div style="margin-top:8px;padding:15px;border:1px solid var(--accent-line);background:var(--accent-soft);border-radius:13px">'
      +'✅ <b>Deployed'+(built?'':' — building')+'!</b> Your own dashboard '+(built?'is live':'will be live in ~1 min')+' at:'
      +'<div style="margin-top:7px"><a href="'+url+'" target="_blank" rel="noopener" class="mono" style="font-size:13.5px;word-break:break-all">'+esc(owner)+'.github.io/pr-dashboard/</a></div>'
      +'<div class="row" style="margin-top:13px">'
        +'<a class="btn primary" href="'+url+'" target="_blank" rel="noopener">Open my dashboard →</a>'
        +'<button class="btn" id="copyUrl">Copy URL</button>'
      +'</div>'
      +'<div class="help" style="margin-top:11px">You’ll paste your token once there (it’s a new domain) — then it’s all yours, on your own GitHub.</div>'
      +'</div>';
    const cp=$("copyUrl"); if(cp) cp.onclick=()=>{ navigator.clipboard.writeText(url).then(()=>{ cp.textContent="Copied ✓"; setTimeout(()=>{ cp.textContent="Copy URL"; },1800); }); };
  }catch(e){ $("dstatus").textContent=""; $("lerr").textContent=String(e.message||e); }
  finally{ dbtn.disabled=false; cbtn.disabled=false; }
}

/* ---------- wiring ---------- */
$("srcLink").href=REPO_URL;
document.addEventListener("input", e=>{ if(e.target.id==="q") render(); });
$("chips").addEventListener("click", e=>{ const c=e.target.closest(".chip"); if(!c)return;
  activeFilter=c.dataset.f; document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("active",x===c)); render(); });
document.addEventListener("click", e=>{ const sw=e.target.closest(".swatch"); if(sw) applyTheme(sw.dataset.t); });
$("refresh").addEventListener("click", load);
$("settings").addEventListener("click", showSettings);
$("auto").addEventListener("change", e=>{ if(e.target.checked){ autoTimer=setInterval(load,60000); } else clearInterval(autoTimer); });
document.addEventListener("keydown", e=>{ const q=$("q"); if(e.key==="/"&&document.activeElement!==q&&q&&q.offsetParent){ e.preventDefault(); q.focus(); } });

applyTheme(get(LS.theme,"orange"));
if(get(LS.token,"")) connectAndLoad(); else showLanding();
</script>
