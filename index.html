<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PR Dashboard</title>
<link id="favicon" rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%AD%3C/text%3E%3C/svg%3E" />
<meta name="description" content="A private, open-source dashboard for your open + recently-closed GitHub PRs with live CI status. Runs entirely in your browser." />
<meta property="og:title" content="PR Dashboard" />
<meta property="og:description" content="Your open + recently-closed PRs with live CI status — private, client-side, open source." />
<meta name="twitter:card" content="summary" />
<style>
  :root {
    --accent:#C5B8FF; --accent-soft:rgba(197,184,255,.16); --accent-line:rgba(197,184,255,.45);
    --bg:#0b0a10; --bg2:#0f0e16; --panel:#16141f; --panel2:#1c1929; --border:#2a2740;
    --text:#ece9f6; --muted:#9a93b5; --link:#C5B8FF;
    --pass:#54d18c; --fail:#ff6b6b; --run:#f5c451; --neutral:#9a93b5;
    --open:#54d18c; --merged:#C5B8FF; --closed:#ff6b6b;
  }
  * { box-sizing:border-box; }
  html,body { background:var(--bg); }
  body {
    margin:0; color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(900px 380px at 12% -8%, rgba(197,184,255,.10), transparent 60%),
      radial-gradient(700px 320px at 100% 0%, rgba(197,184,255,.06), transparent 55%),
      var(--bg);
    min-height:100vh;
  }
  a { color:var(--link); }
  header {
    position:sticky; top:0; z-index:10;
    background:linear-gradient(180deg, rgba(15,14,22,.96), rgba(15,14,22,.86)); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border); padding:14px 22px;
  }
  .brand { display:flex; align-items:center; gap:13px; }
  .avatar { width:42px; height:42px; border-radius:50%; border:2px solid var(--accent-line); box-shadow:0 0 0 3px var(--accent-soft); object-fit:cover; background:var(--panel); }
  .logo { width:42px; height:42px; border-radius:12px; display:grid; place-items:center; font-size:22px; background:var(--accent-soft); border:1px solid var(--accent-line); }
  .who { display:flex; flex-direction:column; line-height:1.25; }
  .who .name { font-weight:700; font-size:16px; letter-spacing:.2px; }
  .who .name b { color:var(--accent); font-weight:700; }
  .who .sub { color:var(--muted); font-size:12px; }
  .grow { flex:1; }
  .hbtns { display:flex; align-items:center; gap:9px; }
  .btn {
    cursor:pointer; padding:7px 13px; border-radius:9px; border:1px solid var(--border);
    background:var(--panel); color:var(--text); font-size:13px; font-weight:600; transition:.15s; text-decoration:none; display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover { border-color:var(--accent-line); }
  .btn.primary { background:var(--accent); color:#221b3a; border-color:var(--accent); }
  .btn.primary:hover { filter:brightness(1.07); }
  .btn[disabled] { opacity:.55; cursor:default; }
  .toggle { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:12px; cursor:pointer; user-select:none; }
  .toggle input { accent-color:var(--accent); }
  .controls { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; align-items:center; }
  #q {
    flex:1; min-width:240px; padding:9px 13px; border-radius:10px; border:1px solid var(--border);
    background:var(--bg2); color:var(--text); font-size:14px;
  }
  #q:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { cursor:pointer; user-select:none; padding:6px 11px; border-radius:999px; border:1px solid var(--border); background:var(--panel); color:var(--muted); font-size:12px; font-weight:600; transition:.12s; }
  .chip:hover { color:var(--text); }
  .chip.active { color:var(--accent); border-color:var(--accent-line); background:var(--accent-soft); }
  .counts { color:var(--muted); font-size:12px; margin-left:auto; white-space:nowrap; }
  .counts b { color:var(--text); }
  main { padding:18px 22px 70px; max-width:1140px; margin:0 auto; }
  details.repo { margin-bottom:14px; border:1px solid var(--border); border-radius:13px; overflow:hidden; background:linear-gradient(180deg,var(--panel),var(--bg2)); }
  details.repo > summary { cursor:pointer; padding:11px 15px; font-weight:700; list-style:none; display:flex; align-items:center; gap:10px; }
  details.repo > summary::-webkit-details-marker { display:none; }
  details.repo > summary::before { content:"▸"; color:var(--accent); transition:transform .15s; display:inline-block; }
  details.repo[open] > summary::before { transform:rotate(90deg); }
  .repo-count { color:var(--muted); font-weight:500; font-size:12px; }
  .repo-badges { margin-left:auto; display:flex; gap:6px; font-size:12px; }
  .pr { border-top:1px solid var(--border); }
  details.pr > summary { cursor:pointer; padding:10px 15px; list-style:none; display:flex; align-items:center; gap:10px; }
  details.pr > summary::-webkit-details-marker { display:none; }
  details.pr[open] > summary { background:var(--panel2); }
  .ci-dot { width:18px; text-align:center; flex:0 0 auto; font-size:13px; }
  .pr-title { color:var(--text); text-decoration:none; font-weight:600; }
  .pr-title:hover { color:var(--accent); text-decoration:underline; }
  .pr-num { color:var(--muted); font-size:12px; }
  .badge { font-size:11px; padding:1px 8px; border-radius:999px; border:1px solid var(--border); white-space:nowrap; font-weight:600; }
  .b-open { color:var(--open); border-color:rgba(84,209,140,.5); }
  .b-merged { color:var(--merged); border-color:var(--accent-line); }
  .b-closed { color:var(--closed); border-color:rgba(255,107,107,.5); }
  .b-draft { color:var(--muted); }
  .b-review { color:var(--run); border-color:rgba(245,196,81,.5); }
  .spacer { flex:1; }
  .when { color:var(--muted); font-size:12px; white-space:nowrap; }
  .stat { color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
  .checks { padding:5px 15px 13px 42px; background:var(--bg2); }
  .check { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:13px; }
  .check a { text-decoration:none; }
  .check a:hover { text-decoration:underline; }
  .check .wf { color:var(--muted); }
  .none { color:var(--muted); font-style:italic; }
  .empty { color:var(--muted); text-align:center; padding:46px; }
  /* landing */
  .hero { max-width:680px; margin:38px auto 0; text-align:center; }
  .hero .logo { width:64px; height:64px; border-radius:18px; font-size:34px; margin:0 auto 16px; }
  .hero h1 { font-size:30px; margin:0 0 8px; letter-spacing:-.3px; }
  .hero h1 b { color:var(--accent); }
  .hero p.tag { color:var(--muted); font-size:15px; margin:0 auto; max-width:520px; }
  .grid { max-width:880px; margin:30px auto 0; display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width:760px){ .grid { grid-template-columns:1fr; } }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:22px; }
  .card h2 { margin:0 0 4px; font-size:15px; display:flex; align-items:center; gap:8px; }
  .card h2 .k { color:var(--accent); }
  .safe li { color:var(--muted); font-size:13px; margin:9px 0; list-style:none; padding-left:24px; position:relative; }
  .safe li::before { content:"🛡️"; position:absolute; left:0; }
  .safe ul { margin:10px 0 0; padding:0; }
  ol.steps { margin:10px 0 0; padding-left:0; counter-reset:s; list-style:none; }
  ol.steps li { position:relative; padding:0 0 14px 34px; color:var(--muted); font-size:13px; }
  ol.steps li::before { counter-increment:s; content:counter(s); position:absolute; left:0; top:-1px; width:22px; height:22px; border-radius:50%; background:var(--accent-soft); border:1px solid var(--accent-line); color:var(--accent); font-weight:700; font-size:12px; display:grid; place-items:center; }
  ol.steps b { color:var(--text); }
  ol.steps code { background:var(--bg2); border:1px solid var(--border); padding:1px 6px; border-radius:5px; color:var(--text); }
  .connect { max-width:880px; margin:18px auto 0; background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--accent-line); border-radius:16px; padding:22px; }
  .connect label { display:block; font-size:12px; color:var(--muted); margin:0 0 6px; font-weight:600; }
  .connect .row { display:flex; gap:10px; flex-wrap:wrap; }
  .connect input { flex:1; min-width:240px; padding:11px 13px; border-radius:10px; border:1px solid var(--border); background:var(--bg2); color:var(--text); font-size:14px; }
  .connect input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .connect .btn.primary { padding:11px 20px; font-size:14px; }
  .err { color:var(--fail); font-size:13px; margin-top:10px; min-height:18px; }
  .foot { max-width:880px; margin:22px auto 0; text-align:center; color:var(--muted); font-size:12px; }
  .spin { display:inline-block; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hide { display:none !important; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <!-- pre-connect brand -->
    <div class="logo" id="brandLogo">🔭</div>
    <!-- post-connect avatar -->
    <img class="avatar hide" id="brandAvatar" alt="" />
    <div class="who">
      <span class="name" id="brandName">PR Dashboard</span>
      <span class="sub" id="brandSub">open + recently-closed PRs · live CI</span>
    </div>
    <span class="grow"></span>
    <div class="hbtns" id="brandBtns">
      <a class="btn" id="srcLink" href="#" target="_blank" rel="noopener">View source ↗</a>
      <button class="btn primary hide" id="refresh">🔄 Refresh</button>
      <label class="toggle hide" id="autoWrap"><input type="checkbox" id="auto" /> auto 60s</label>
      <button class="btn hide" id="settings" title="Settings & sign out">⚙︎</button>
    </div>
  </div>
  <div class="controls hide" id="controls">
    <input id="q" type="search" placeholder="Search title, repo, branch, #number…   (press / to focus)" />
    <div class="chips" id="chips">
      <span class="chip active" data-f="all">All</span>
      <span class="chip" data-f="open">Open</span>
      <span class="chip" data-f="closed">Closed/Merged</span>
      <span class="chip" data-f="failing">CI failing</span>
      <span class="chip" data-f="running">CI running</span>
    </div>
    <span class="counts" id="counts"></span>
  </div>
</header>
<main id="main"></main>

<script>
const REPO_URL = "https://github.com/alberthammerich/pr-dashboard"; // open-source home
const LS = { token:"prdash_token", author:"prdash_author", hours:"prdash_hours", me:"prdash_me" };
const HOURS_DEFAULT = 48;

const get = (k, d) => localStorage.getItem(k) ?? d;
let DB = null, ME = null, activeFilter = "all", autoTimer = null;

const ICON = { pass:"✅", fail:"❌", running:"🟡", skip:"⚪", none:"·", other:"⚪" };
const CIICON = { pass:"✅", fail:"❌", running:"🟡", none:"·" };

function rel(iso){ if(!iso) return ""; const d=(Date.now()-new Date(iso).getTime())/1000,m=60,h=3600,day=86400;
  if(d<0) return "just now"; if(d<m) return Math.floor(d)+"s ago"; if(d<h) return Math.floor(d/m)+"m ago"; if(d<day) return Math.floor(d/h)+"h ago"; return Math.floor(d/day)+"d ago"; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function $(id){ return document.getElementById(id); }

/* ---------- GitHub REST (client-side, with your token) ---------- */
function api(path){
  const token = get(LS.token, "");
  return fetch("https://api.github.com"+path, {
    headers:{ "Authorization":"Bearer "+token, "Accept":"application/vnd.github+json", "X-GitHub-Api-Version":"2022-11-28" },
    cache:"no-store",
  }).then(async r=>{
    if(r.status===401) throw new Error("Bad token (401) — open ⚙︎ and re-enter it.");
    if(r.status===403){ const b=await r.text(); throw new Error("Rate limited / forbidden (403). "+(b.includes("rate")?"Wait a minute.":"")); }
    if(!r.ok) throw new Error("GitHub "+r.status+" on "+path);
    return r.json();
  });
}
async function pool(items, n, fn){
  const out=new Array(items.length); let i=0;
  await Promise.all(Array.from({length:Math.min(n,items.length)||1}, async()=>{
    while(i<items.length){ const idx=i++; try{ out[idx]=await fn(items[idx],idx); }catch(e){ out[idx]={__err:String(e.message||e)}; } }
  }));
  return out;
}
function normChecks(runs, statuses){
  const out=[];
  for(const c of (runs||[])){
    let status;
    if((c.status||"").toUpperCase()!=="COMPLETED") status="running";
    else { const k=(c.conclusion||"").toUpperCase();
      status = k==="SUCCESS"?"pass" : (k==="NEUTRAL"||k==="SKIPPED")?"skip" : "fail"; }
    out.push({ status, name:c.name||"check", workflow:(c.app&&c.app.name)||"", url:c.details_url||c.html_url||"" });
  }
  for(const s of (statuses||[])){
    const k=(s.state||"").toUpperCase();
    const status = k==="SUCCESS"?"pass" : k==="PENDING"?"running" : (k==="FAILURE"||k==="ERROR")?"fail":"other";
    out.push({ status, name:s.context||"status", workflow:"", url:s.target_url||"" });
  }
  return out;
}
function rollup(checks){ if(!checks.length) return "none";
  if(checks.some(c=>c.status==="fail")) return "fail";
  if(checks.some(c=>c.status==="running")) return "running";
  if(checks.some(c=>c.status==="pass")) return "pass"; return "none"; }

async function enrich(item){
  const repo = item.repository_url.replace("https://api.github.com/repos/","");
  const merged = !!(item.pull_request && item.pull_request.merged_at);
  let state = item.state==="open" ? "OPEN" : (merged ? "MERGED" : "CLOSED");
  let branch="", sha="", additions=null, deletions=null, comments=null, draft=!!item.draft, review="";
  try {
    const pr = await api("/repos/"+repo+"/pulls/"+item.number);
    sha=pr.head&&pr.head.sha; branch=(pr.head&&pr.head.ref)||""; draft=!!pr.draft;
    additions=pr.additions; deletions=pr.deletions; comments=pr.comments;
    if((pr.requested_reviewers&&pr.requested_reviewers.length)||(pr.requested_teams&&pr.requested_teams.length)) review="REVIEW_REQUIRED";
  } catch(e){}
  let checks=[];
  if(sha){
    const [cr, st] = await Promise.all([
      api("/repos/"+repo+"/commits/"+sha+"/check-runs?per_page=100").then(r=>r.check_runs).catch(()=>[]),
      api("/repos/"+repo+"/commits/"+sha+"/status").then(r=>r.statuses).catch(()=>[]),
    ]);
    checks = normChecks(cr, st);
  }
  return { number:item.number, title:item.title, url:item.html_url, repo, state, isDraft:draft,
    reviewDecision:review, branch, additions, deletions, comments,
    createdAt:item.created_at, updatedAt:item.updated_at, closedAt:item.closed_at||null,
    ci:rollup(checks), checks };
}
async function collect(){
  const author = get(LS.author, "") || (ME && ME.login);
  const hours = Number(get(LS.hours, HOURS_DEFAULT));
  const cutoff = Date.now() - hours*3600*1000;
  const sinceDay = new Date(cutoff).toISOString().slice(0,10);
  const q = s => "/search/issues?per_page=60&sort=updated&order=desc&q=" + encodeURIComponent(s);
  const [open, closed] = await Promise.all([
    api(q(`author:${author} type:pr state:open`)).then(r=>r.items),
    api(q(`author:${author} type:pr state:closed closed:>=${sinceDay}`)).then(r=>r.items),
  ]);
  const recentClosed = closed.filter(p=>p.closed_at && new Date(p.closed_at).getTime()>=cutoff);
  const prs = await pool([...open, ...recentClosed], 6, enrich);
  return { prs, generatedAt:new Date().toISOString(), author, hours };
}

/* ---------- render dashboard ---------- */
function stateBadge(pr){ if(pr.state==="MERGED")return '<span class="badge b-merged">merged</span>';
  if(pr.state==="CLOSED")return '<span class="badge b-closed">closed</span>';
  if(pr.isDraft)return '<span class="badge b-draft">draft</span>'; return '<span class="badge b-open">open</span>'; }
function reviewBadge(pr){ return (pr.state==="OPEN"&&pr.reviewDecision==="REVIEW_REQUIRED")?'<span class="badge b-review">review</span>':""; }
function matches(pr, term){
  if(activeFilter==="open"&&pr.state!=="OPEN") return false;
  if(activeFilter==="closed"&&pr.state==="OPEN") return false;
  if(activeFilter==="failing"&&pr.ci!=="fail") return false;
  if(activeFilter==="running"&&pr.ci!=="running") return false;
  if(!term) return true;
  const hay=(pr.title+" "+pr.repo+" "+pr.branch+" #"+pr.number).toLowerCase();
  return term.split(/\s+/).every(t=>hay.includes(t));
}
function render(){
  if(!DB) return;
  const term=$("q").value.trim().toLowerCase();
  const main=$("main"); const byRepo={}; let shown=0;
  for(const pr of DB.prs){ if(!matches(pr,term)) continue; (byRepo[pr.repo]||=[]).push(pr); shown++; }
  const repos=Object.keys(byRepo).sort(); main.innerHTML="";
  if(!repos.length){ main.innerHTML='<div class="empty">No PRs match.</div>'; updateCounts(0); return; }
  const expandFail=!!term||activeFilter!=="all";
  for(const repo of repos){
    const list=byRepo[repo].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
    const fail=list.filter(p=>p.ci==="fail").length, run=list.filter(p=>p.ci==="running").length;
    const d=document.createElement("details"); d.className="repo"; d.open=true;
    let badges=""; if(fail)badges+='<span class="badge b-closed">'+fail+' ❌</span>'; if(run)badges+='<span class="badge b-review">'+run+' 🟡</span>';
    d.innerHTML='<summary>'+esc(repo)+' <span class="repo-count">'+list.length+'</span><span class="repo-badges">'+badges+'</span></summary>';
    for(const pr of list){
      const pd=document.createElement("details"); pd.className="pr"; pd.open=expandFail&&(pr.ci==="fail"||activeFilter==="failing");
      let checksHtml;
      if(!pr.checks.length){ checksHtml='<div class="none">No CI checks.</div>'; }
      else { const order={fail:0,running:1,pass:2,skip:3,other:4};
        checksHtml=pr.checks.slice().sort((a,b)=>(order[a.status]??9)-(order[b.status]??9)).map(c=>
          '<div class="check">'+(ICON[c.status]||"·")+' '
          +(c.url?'<a href="'+esc(c.url)+'" target="_blank" rel="noopener">'+esc(c.name)+'</a>':esc(c.name))
          +(c.workflow?' <span class="wf">· '+esc(c.workflow)+'</span>':'')+'</div>').join(""); }
      const stats=(pr.additions!=null)?'<span class="stat">+'+pr.additions+' −'+pr.deletions+'</span>':'';
      pd.innerHTML='<summary><span class="ci-dot" title="CI: '+pr.ci+'">'+(CIICON[pr.ci]||"·")+'</span>'
        +'<a class="pr-title" href="'+esc(pr.url)+'" target="_blank" rel="noopener">'+esc(pr.title)+'</a>'
        +'<span class="pr-num">#'+pr.number+(pr.branch?' · '+esc(pr.branch):'')+'</span>'
        +stateBadge(pr)+reviewBadge(pr)+'<span class="spacer"></span>'+stats
        +'<span class="when">'+rel(pr.state==="OPEN"?pr.updatedAt:pr.closedAt)+'</span></summary>'
        +'<div class="checks">'+checksHtml+'</div>';
      d.appendChild(pd);
    }
    main.appendChild(d);
  }
  updateCounts(shown);
}
function updateCounts(shown){
  if(!DB){ $("counts").textContent=""; return; }
  const t=DB.prs.length, fail=DB.prs.filter(p=>p.ci==="fail").length, run=DB.prs.filter(p=>p.ci==="running").length;
  $("counts").innerHTML="<b>"+shown+"</b> / "+t+" PRs"+(fail?" · <b>"+fail+"</b> failing":"")+(run?" · <b>"+run+"</b> running":"");
  $("brandSub").textContent="open + closed < "+DB.hours+"h · updated "+rel(DB.generatedAt);
}

/* ---------- landing (no token) ---------- */
function showLanding(errMsg){
  // header → brand mode
  $("brandLogo").classList.remove("hide"); $("brandAvatar").classList.add("hide");
  $("brandName").innerHTML="PR Dashboard"; $("brandSub").textContent="open + recently-closed PRs · live CI";
  $("refresh").classList.add("hide"); $("autoWrap").classList.add("hide"); $("settings").classList.add("hide");
  $("controls").classList.add("hide"); $("srcLink").classList.remove("hide");
  $("main").innerHTML =
    '<div class="hero"><div class="logo">🔭</div>'
    +'<h1>Your <b>PR</b> cockpit</h1>'
    +'<p class="tag">Every open pull request you’ve authored — plus everything you closed in the last couple of days — grouped by repo, with live CI status you can expand. Private to you, runs entirely in your browser.</p></div>'
    +'<div class="grid">'
      +'<div class="card safe"><h2><span class="k">🛡️</span> Why this is safe</h2><ul>'
        +'<li>This is a <b>static page</b> — there is no backend server. Nothing you enter is sent anywhere except directly to <code>api.github.com</code> over HTTPS.</li>'
        +'<li>Your token is stored <b>only in this browser’s</b> <code>localStorage</code>, on this device. It never touches a third party.</li>'
        +'<li>It’s <b>100% open source</b> — <a id="srcLink2" href="#" target="_blank" rel="noopener">read every line</a>. No hidden network calls, no analytics.</li>'
        +'<li>The token is used <b>read-only</b>; the dashboard never writes to your repos.</li>'
        +'<li><b>Revoke anytime</b> at github.com/settings/tokens, or hit <b>Sign out</b> to wipe it from this browser.</li>'
      +'</ul></div>'
      +'<div class="card"><h2><span class="k">⚙︎</span> Set it up (about a minute)</h2><ol class="steps">'
        +'<li><b>Create a token:</b> open <a href="https://github.com/settings/tokens/new?scopes=repo&description=PR%20Dashboard" target="_blank" rel="noopener">github.com/settings/tokens/new</a>, tick <code>repo</code>, set <b>Expiration: No expiration</b>, Generate. <span style="opacity:.8">(Public repos only? a no-scope token works too.)</span></li>'
        +'<li><b>Org repos (SSO):</b> if your PRs are in an org like a company, click <b>Configure SSO</b> on the token and authorize it.</li>'
        +'<li><b>Paste it below</b> and hit Connect. That’s it — you’ll never paste it again on this browser.</li>'
      +'</ol></div>'
    +'</div>'
    +'<div class="connect"><label>Your GitHub token</label><div class="row">'
      +'<input id="tok" type="password" placeholder="ghp_…" autocomplete="off" />'
      +'<button class="btn primary" id="connect">Connect GitHub →</button>'
    +'</div><div class="err" id="lerr">'+(errMsg?esc(errMsg):"")+'</div></div>'
    +'<div class="foot">No accounts. No tracking. Open source. · <a id="srcLink3" href="#" target="_blank" rel="noopener">View the code</a></div>';
  [ "srcLink","srcLink2","srcLink3" ].forEach(id=>{ const el=$(id); if(el) el.href=REPO_URL; });
  const go=()=>{
    const tv=$("tok").value.trim();
    if(!tv){ $("lerr").textContent="Paste a token first."; return; }
    localStorage.setItem(LS.token, tv);
    connectAndLoad();
  };
  $("connect").onclick=go;
  $("tok").addEventListener("keydown", e=>{ if(e.key==="Enter") go(); });
  $("tok").focus();
}

/* ---------- settings (signed in) ---------- */
function showSettings(){
  const author=get(LS.author,"")||(ME&&ME.login)||"", hours=get(LS.hours,HOURS_DEFAULT);
  $("main").innerHTML =
    '<div class="connect" style="max-width:560px"><h2 style="margin:0 0 12px;font-size:16px">Settings</h2>'
    +'<label>Author to track (defaults to you)</label><input id="sAuth" value="'+esc(author)+'" />'
    +'<label style="margin-top:12px">Closed window (hours)</label><input id="sHrs" type="number" value="'+esc(String(hours))+'" />'
    +'<div class="row" style="margin-top:16px"><button class="btn primary" id="sSave">Save & reload</button>'
    +'<button class="btn" id="sOut">Sign out</button></div>'
    +'<div class="err" id="serr"></div></div>';
  $("sSave").onclick=()=>{
    localStorage.setItem(LS.author, $("sAuth").value.trim());
    localStorage.setItem(LS.hours, String(Number($("sHrs").value)||HOURS_DEFAULT));
    DB=null; load();
  };
  $("sOut").onclick=signOut;
}
function signOut(){
  localStorage.removeItem(LS.token); localStorage.removeItem(LS.author);
  localStorage.removeItem(LS.hours); localStorage.removeItem(LS.me);
  DB=null; ME=null; if(autoTimer){ clearInterval(autoTimer); autoTimer=null; } $("auto").checked=false;
  showLanding();
}

/* ---------- identity + load ---------- */
function applyIdentity(me){
  ME=me;
  $("brandLogo").classList.add("hide");
  const av=$("brandAvatar"); av.src=me.avatar_url; av.classList.remove("hide");
  $("brandName").innerHTML="<b>"+esc(me.login)+"</b> · PR Dashboard";
  $("favicon").href=me.avatar_url;
  $("refresh").classList.remove("hide"); $("autoWrap").classList.remove("hide"); $("settings").classList.remove("hide");
  $("srcLink").classList.add("hide"); $("controls").classList.remove("hide");
}
async function connectAndLoad(){
  $("main").innerHTML='<div class="empty"><span class="spin">⟳</span> Connecting…</div>';
  try{
    const me=await api("/user");
    localStorage.setItem(LS.me, JSON.stringify({login:me.login, avatar_url:me.avatar_url, name:me.name}));
    applyIdentity(me);
    await load();
  }catch(e){
    localStorage.removeItem(LS.token);
    showLanding(String(e.message||e));
  }
}
async function load(){
  if(!get(LS.token,"")){ showLanding(); return; }
  if(!ME){ const cached=get(LS.me,""); if(cached){ try{ applyIdentity(JSON.parse(cached)); }catch(e){} } }
  const btn=$("refresh");
  btn.disabled=true; btn.innerHTML='<span class="spin">⟳</span> Refreshing…';
  if(!DB){ $("main").innerHTML='<div class="empty"><span class="spin">⟳</span> Loading your PRs…</div>'; }
  try{ DB=await collect(); render(); }
  catch(e){
    $("main").innerHTML='<div class="connect" style="max-width:560px"><h2 style="margin:0 0 8px;font-size:16px">Couldn’t load</h2><p class="err">'+esc(String(e.message||e))+'</p><div class="row"><button class="btn primary" id="retry">Retry</button><button class="btn" id="fix">Settings</button></div></div>';
    const r=$("retry"), f=$("fix"); if(r) r.onclick=load; if(f) f.onclick=showSettings;
  }
  finally{ btn.disabled=false; btn.innerHTML="🔄 Refresh"; }
}

/* ---------- wiring ---------- */
$("srcLink").href=REPO_URL;
document.addEventListener("input", e=>{ if(e.target.id==="q") render(); });
$("chips").addEventListener("click", e=>{ const c=e.target.closest(".chip"); if(!c)return;
  activeFilter=c.dataset.f; document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("active",x===c)); render(); });
$("refresh").addEventListener("click", load);
$("settings").addEventListener("click", showSettings);
$("auto").addEventListener("change", e=>{ if(e.target.checked){ autoTimer=setInterval(load,60000); } else clearInterval(autoTimer); });
document.addEventListener("keydown", e=>{ const q=$("q"); if(e.key==="/"&&document.activeElement!==q&&q&&q.offsetParent){ e.preventDefault(); q.focus(); } });

if(get(LS.token,"")) connectAndLoad(); else showLanding();
</script>
</body>
</html>
